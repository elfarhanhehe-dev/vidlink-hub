<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Videy — Video Sharing</title>
    <meta name="description" content="Minimal video sharing platform. Admin uploads, public links." />
    <meta property="og:title" content="Videy — Video Sharing" />
    <meta property="og:description" content="Minimal video sharing platform. Admin uploads, public links." />
    <meta property="og:type" content="website" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0a;
        --fg: #fafafa;
        --muted: #a1a1aa;
        --accent: #ff2d55;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; }
      body {
        background: radial-gradient(ellipse at top, #1a0a14 0%, var(--bg) 60%);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .wrap { max-width: 640px; text-align: center; }
      .badge {
        display: inline-block;
        padding: 6px 14px;
        border-radius: 999px;
        background: rgba(255, 45, 85, 0.12);
        color: var(--accent);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        margin-bottom: 24px;
      }
      h1 {
        font-size: clamp(40px, 8vw, 72px);
        line-height: 1.05;
        margin: 0 0 20px;
        letter-spacing: -0.03em;
        font-weight: 800;
      }
      h1 span {
        background: linear-gradient(135deg, var(--accent), #ff6b9d);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p { color: var(--muted); font-size: 18px; line-height: 1.6; margin: 0 0 32px; }
      .cta {
        display: inline-block;
        padding: 14px 28px;
        border-radius: 12px;
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        box-shadow: 0 10px 30px -10px rgba(255, 45, 85, 0.6);
      }
      .cta:hover { transform: translateY(-2px); box-shadow: 0 14px 34px -10px rgba(255, 45, 85, 0.8); }
      footer { margin-top: 40px; font-size: 13px; color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <span class="badge">Videy</span>
      <h1>Share videos <span>instantly</span>.</h1>
      <p>Admin-only uploads. Public share links. Built for speed.</p>
      <a class="cta" href="/admin">Admin Login</a>
      <footer>Deploy the full app to enable uploads & analytics.</footer>
    </main>
  </body>
</html>
