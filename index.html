<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
    <title>YT Downloader - Premium Studio</title>
</head>
<body class="bg-[#fafafa] text-[#1a1a1a] min-h-screen flex items-center justify-center p-6">

    <div class="max-w-2xl w-full">
        <header class="mb-12 text-center">
            <h1 class="text-4xl font-light tracking-tight mb-3">EL <span class="font-bold">Downloader</span></h1>
            <p class="text-gray-400 font-light">High-speed media conversion via Cloudflare Edge.</p>
        </header>

        <div class="bg-white p-2 rounded-2xl shadow-sm border border-gray-100 flex gap-2">
            <input id="ytUrl" type="text" placeholder="https://youtube.com/watch?v=..." 
                   class="flex-1 bg-transparent px-5 py-4 focus:outline-none text-lg">
            <button onclick="processVideo()" id="btnAction" class="bg-black text-white px-8 py-4 rounded-xl hover:bg-zinc-800 transition-all font-medium">
                Fetch
            </button>
        </div>

        <div id="resultCard" class="mt-8 hidden bg-white p-8 rounded-2xl border border-gray-100 shadow-sm animate-pulse">
            <div id="videoInfo" class="flex flex-col items-center">
                <img id="thumb" src="" class="w-full rounded-xl mb-4 hidden">
                <h3 id="title" class="text-xl font-semibold mb-6">Processing...</h3>
                <div id="links" class="flex flex-wrap justify-center gap-3"></div>
            </div>
        </div>
    </div>

    <script>
        async function processVideo() {
            const url = document.getElementById('ytUrl').value;
            const card = document.getElementById('resultCard');
            const linksDiv = document.getElementById('links');
            const btn = document.getElementById('btnAction');

            if(!url) return alert("Please paste a URL");

            btn.innerText = "Loading...";
            card.classList.remove('hidden');
            linksDiv.innerHTML = "";

            try {
                // Ganti dengan URL Cloudflare Worker kamu
                const response = await fetch(`https://your-worker.workers.dev/api/download?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                document.getElementById('title').innerText = data.title || "Video Found";
                if(data.thumbnail) {
                    const img = document.getElementById('thumb');
                    img.src = data.thumbnail;
                    img.classList.remove('hidden');
                }

                // Menampilkan tombol download (format API bisa berbeda tergantung provider RapidAPI)
                data.videos.items.forEach(item => {
                    const a = document.createElement('a');
                    a.href = item.url;
                    a.innerText = `${item.quality} (${item.extension})`;
                    a.className = "px-6 py-2 bg-zinc-100 hover:bg-zinc-200 rounded-lg text-sm font-medium transition";
                    a.target = "_blank";
                    linksDiv.appendChild(a);
                });

                card.classList.remove('animate-pulse');
                btn.innerText = "Fetch";
            } catch (err) {
                alert("Error fetching data");
                btn.innerText = "Fetch";
            }
        }
    </script>
</body>
</html>
